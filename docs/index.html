<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NGS Projects - Home</title>
  <meta name="description" content="Panoramica progetti NGS con stato avanzamento e ultimi aggiornamenti." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body data-page="index">
  <div class="ambient ambient-top"></div>
  <div class="ambient ambient-bottom"></div>

  <div class="brand-bar">
    <a class="brand-link" href="./index.html">
      <img id="brand-logo" class="brand-logo" src="./assets/ngs-mark.svg" alt="Logo" />
      <div class="brand-text">
        <strong id="brand-name">Nicola Ghiselli Solutions</strong>
        <span id="brand-tagline">Project portfolio</span>
      </div>
    </a>
  </div>

  <header class="hero">
    <div>
      <p class="hero-kicker">NGS PROJECTS</p>
      <h1>Roadmap portfolio</h1>
      <p id="generated-at" class="hero-meta">Caricamento dati...</p>
    </div>
    <div class="hero-side">
      <label for="search-input" class="field-label">Cerca progetto</label>
      <input id="search-input" type="search" placeholder="Es. ngs-time-utilities" autocomplete="off" />
      <div class="stats" id="stats"></div>
    </div>
  </header>

  <main class="home-tabs">
    <nav class="tab-nav" role="tablist" aria-label="Board progetti">
      <button class="tab-btn is-active" type="button" role="tab" aria-selected="true" data-tab-target="active">Da Pianificare a In Corso</button>
      <button class="tab-btn" type="button" role="tab" aria-selected="false" data-tab-target="closed">In Pausa, Completato, Archiviato</button>
      <button class="tab-btn" type="button" role="tab" aria-selected="false" data-tab-target="updates">Aggiornamenti</button>
    </nav>

    <section class="tab-panel is-active" data-tab-panel="active">
      <section class="columns">
        <article class="column" data-status="Da pianificare">
          <header class="column-header">
            <h2>Da pianificare</h2>
            <span class="count" id="count-da-pianificare">0</span>
          </header>
          <div class="cards" id="cards-da-pianificare"></div>
        </article>

        <article class="column" data-status="Pianificato">
          <header class="column-header">
            <h2>Pianificato</h2>
            <span class="count" id="count-pianificato">0</span>
          </header>
          <div class="cards" id="cards-pianificato"></div>
        </article>

        <article class="column" data-status="In corso">
          <header class="column-header">
            <h2>In corso</h2>
            <span class="count" id="count-in-corso">0</span>
          </header>
          <div class="cards" id="cards-in-corso"></div>
        </article>
      </section>
    </section>

    <section class="tab-panel" data-tab-panel="closed" hidden>
      <section class="columns">
        <article class="column" data-status="In pausa">
          <header class="column-header">
            <h2>In pausa</h2>
            <span class="count" id="count-in-pausa">0</span>
          </header>
          <div class="cards" id="cards-in-pausa"></div>
        </article>

        <article class="column" data-status="Completato">
          <header class="column-header">
            <h2>Completato</h2>
            <span class="count" id="count-completato">0</span>
          </header>
          <div class="cards" id="cards-completato"></div>
        </article>

        <article class="column" data-status="Archiviato">
          <header class="column-header">
            <h2>Archiviato</h2>
            <span class="count" id="count-archiviato">0</span>
          </header>
          <div class="cards" id="cards-archiviato"></div>
        </article>
      </section>
    </section>

    <section class="tab-panel" data-tab-panel="updates" hidden>
      <aside class="updates updates-full">
        <header class="updates-header">
          <h2>Ultimi aggiornamenti</h2>
        </header>
        <ol id="updates-list" class="updates-list"></ol>
      </aside>
    </section>
  </main>

  <footer class="site-footer">
    <div id="footer-company" class="footer-company"></div>
    <div id="footer-links" class="footer-links"></div>
  </footer>

  <template id="project-card-template">
    <a class="project-card" href="#">
      <div class="project-top">
        <h3></h3>
        <span class="pill"></span>
      </div>
      <p class="project-status"></p>
      <p class="project-objective"></p>
      <div class="project-bottom">
        <span class="mono project-date"></span>
      </div>
    </a>
  </template>

  <script src="./data/brand.js"></script>
  <script src="./data/projects.js"></script>
  <script src="./assets/site.js"></script>
</body>
</html>
